name: Validate Setup

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Check credentials & dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Credential check (reads .env directly, zero network calls) ───────────
      - name: Validate required environment credentials
        shell: bash
        run: |
          if [ ! -f backend/.env ]; then
            echo "FAIL: backend/.env not found"
            exit 1
          fi

          set -a
          source backend/.env
          set +a

          MISSING=()
          for var in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY IMAGEKIT_PUBLIC_KEY IMAGEKIT_PRIVATE_KEY IMAGEKIT_URL_ENDPOINT; do
            val="${!var:-}"
            if [ -z "$val" ]; then
              echo "  MISSING: $var"
              MISSING+=("$var")
            else
              echo "  OK:      $var"
            fi
          done

          for var in SUPABASE_ANON_KEY DEEPSEEK_API_KEY CHOICE_LANDLORD_ID GITHUB_TOKEN; do
            val="${!var:-}"
            if [ -z "$val" ]; then echo "  OPTIONAL (not set): $var"
            else echo "  OK:      $var"; fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "FAIL: Missing required credentials: ${MISSING[*]}"
            exit 1
          fi
          echo ""
          echo "All required credentials present."

      # ── Node / Frontend build ────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: cd frontend && npm ci --silent

      - name: Build frontend
        run: cd frontend && npm run build
