name: Validate Setup

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Check credentials & dependencies
    runs-on: ubuntu-latest

    # ── Inject all project secrets as environment variables ──────────────────
    # Secrets are stored in GitHub repo Settings → Secrets and variables → Actions.
    # To sync them from Replit automatically, run:  python3 scripts/sync-secrets-to-github.py
    env:
      SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY:          ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN:      ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DEEPSEEK_API_KEY:           ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
      IMAGEKIT_PUBLIC_KEY:        ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
      IMAGEKIT_PRIVATE_KEY:       ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
      IMAGEKIT_URL_ENDPOINT:      ${{ secrets.IMAGEKIT_URL_ENDPOINT }}
      GEOAPIFY_API_KEY:           ${{ secrets.GEOAPIFY_API_KEY }}
      CLOUDFLARE_API_TOKEN:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GOOGLE_APPS_SCRIPT_URL:     ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
      GOOGLE_APPS_SCRIPT_AUTH_TOKEN: ${{ secrets.GOOGLE_APPS_SCRIPT_AUTH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Credential validation (reads from injected env, no .env file needed) ─
      - name: Validate required credentials
        shell: bash
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║          Property Pipeline — CI Credential Check         ║"
          echo "╠══════════════════════════════════════════════════════════╣"

          REQUIRED=(
            SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            DEEPSEEK_API_KEY
            IMAGEKIT_PUBLIC_KEY
            IMAGEKIT_PRIVATE_KEY
            IMAGEKIT_URL_ENDPOINT
          )

          OPTIONAL=(
            SUPABASE_ANON_KEY
            SUPABASE_ACCESS_TOKEN
            GEMINI_API_KEY
            GEOAPIFY_API_KEY
            CLOUDFLARE_API_TOKEN
            GOOGLE_APPS_SCRIPT_URL
            GOOGLE_APPS_SCRIPT_AUTH_TOKEN
          )

          MISSING=()
          for var in "${REQUIRED[@]}"; do
            val="${!var:-}"
            if [ -z "$val" ]; then
              echo "║  ✘  MISSING (required): $var"
              MISSING+=("$var")
            else
              echo "║  ✔  OK: $var"
            fi
          done

          for var in "${OPTIONAL[@]}"; do
            val="${!var:-}"
            if [ -z "$val" ]; then
              echo "║  ⚠  not set (optional): $var"
            else
              echo "║  ✔  OK: $var"
            fi
          done

          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "FAIL: Missing required credentials: ${MISSING[*]}"
            echo ""
            echo "To fix: run  python3 scripts/sync-secrets-to-github.py  from Replit."
            exit 1
          fi

          echo "All required credentials present. ✔"

      # ── Node / Frontend ───────────────────────────────────────────────────
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: cd frontend && npm ci --silent

      - name: Build frontend
        run: cd frontend && npm run build

      # ── Python / Backend syntax check ─────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python3 -m py_compile backend/main.py
          find backend -name "*.py" -exec python3 -m py_compile {} \;
          echo "Python syntax OK ✔"
