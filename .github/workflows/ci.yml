name: Validate Setup

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Check credentials & dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r backend/requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm install --silent

      - name: Validate required environment credentials
        run: |
          set -a
          source backend/.env
          set +a
          python3 - <<'EOF'
          import os, sys
          required = {
            "SUPABASE_URL": "Supabase project URL",
            "SUPABASE_SERVICE_ROLE_KEY": "Supabase service-role JWT",
            "IMAGEKIT_PUBLIC_KEY": "ImageKit public key",
            "IMAGEKIT_PRIVATE_KEY": "ImageKit private key",
            "IMAGEKIT_URL_ENDPOINT": "ImageKit CDN endpoint",
          }
          optional = ["SUPABASE_ANON_KEY", "DEEPSEEK_API_KEY", "CHOICE_LANDLORD_ID"]
          missing = [(k, v) for k, v in required.items() if not os.environ.get(k, "").strip()]
          for k, desc in required.items():
            status = "✔" if os.environ.get(k, "").strip() else "✘"
            print(f"  {status} {k}")
          for k in optional:
            status = "✔" if os.environ.get(k, "").strip() else "⚠ (optional)"
            print(f"  {status} {k}")
          if missing:
            print(f"\nFAIL: Missing required credentials: {[k for k,_ in missing]}")
            sys.exit(1)
          print("\nAll required credentials present — setup is valid.")
          EOF

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Import backend (smoke test)
        run: |
          set -a
          source backend/.env
          set +a
          cd backend && python3 -c "
          import os, sys
          sys.path.insert(0, '.')
          from services.setup_service import get_setup_status
          status = get_setup_status()
          print('Summary:', status['summary'])
          print('Core ready:', status['core_ready'])
          print('Publishing ready:', status['publishing_ready'])
          if not status['core_ready']:
            sys.exit(1)
          "
