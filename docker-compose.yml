version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/storage/images:/app/backend/storage/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
